<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Wilayah Indonesia</title>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #27ae60;
            --bg: #f5f6fa;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            display: flex;
            justify-content: center;
            padding: 40px 20px;
            margin: 0;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 500px;
        }

        h2 {
            text-align: center;
            color: var(--primary);
            margin-top: 0;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #555;
        }

        select {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.3s;
        }

        select:focus {
            border-color: var(--accent);
        }

        select:disabled {
            background-color: #eee;
            cursor: not-allowed;
        }

        .info-box {
            margin-top: 25px;
            padding: 15px;
            background: #e8f5e9;
            border-radius: 8px;
            border-left: 5px solid var(--accent);
            display: none;
        }

        .loader {
            font-size: 14px;
            color: var(--accent);
            display: none;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

    <div class="card">
        <h2>📍 Wilayah Indonesia</h2>
        <hr style="border: 0; border-top: 1px solid #eee; margin-bottom: 25px;">

        <div class="form-group">
            <label for="provinsi">Pilih Provinsi:</label>
            <div id="load-prov" class="loader">Memuat provinsi...</div>
            <select id="provinsi">
                <option value="">-- Pilih Provinsi --</option>
            </select>
        </div>

        <div class="form-group">
            <label for="kota">Pilih Kota/Kabupaten:</label>
            <div id="load-kota" class="loader">Memuat kota...</div>
            <select id="kota" disabled>
                <option value="">-- Pilih Kota/Kabupaten --</option>
            </select>
        </div>

        <div id="result" class="info-box">
            <strong>Pilihan Anda:</strong>
            <p id="summary" style="margin: 5px 0 0; color: #2e7d32;"></p>
        </div>
    </div>

    <script>
        const provSelect = document.getElementById('provinsi');
        const kotaSelect = document.getElementById('kota');
        const loadProv = document.getElementById('load-prov');
        const loadKota = document.getElementById('load-kota');
        const resultBox = document.getElementById('result');
        const summary = document.getElementById('summary');

        // 1. Ambil Data Provinsi saat halaman dimuat
        async function getProvinsi() {
            loadProv.style.display = 'block';
            try {
                const response = await fetch('https://www.emsifa.com/api-wilayah-indonesia/api/provinces.json');
                const provinces = await response.json();
                
                provinces.forEach(prov => {
                    let opt = document.createElement('option');
                    opt.value = prov.id;
                    opt.innerHTML = prov.name;
                    provSelect.appendChild(opt);
                });
            } catch (error) {
                alert('Gagal mengambil data provinsi');
            } finally {
                loadProv.style.display = 'none';
            }
        }

        // 2. Ambil Data Kota berdasarkan ID Provinsi
        provSelect.addEventListener('change', async function() {
            const provId = this.value;
            const provName = this.options[this.selectedIndex].text;

            // Reset dropdown kota
            kotaSelect.innerHTML = '<option value="">-- Pilih Kota/Kabupaten --</option>';
            kotaSelect.disabled = true;
            resultBox.style.display = 'none';

            if (!provId) return;

            loadKota.style.display = 'block';
            try {
                const response = await fetch(`https://www.emsifa.com/api-wilayah-indonesia/api/regencies/${provId}.json`);
                const regencies = await response.json();

                regencies.forEach(kota => {
                    let opt = document.createElement('option');
                    opt.value = kota.id;
                    opt.innerHTML = kota.name;
                    kotaSelect.appendChild(opt);
                });

                kotaSelect.disabled = false;
            } catch (error) {
                alert('Gagal mengambil data kota');
            } finally {
                loadKota.style.display = 'none';
            }
        });

        // 3. Tampilkan hasil akhir
        kotaSelect.addEventListener('change', function() {
            if (this.value) {
                const provName = provSelect.options[provSelect.selectedIndex].text;
                const kotaName = this.options[this.selectedIndex].text;
                summary.innerHTML = `${kotaName}, PROVINSI ${provName}`;
                resultBox.style.display = 'block';
            } else {
                resultBox.style.display = 'none';
            }
        });

        getProvinsi();
    </script>
</body>
</html>
